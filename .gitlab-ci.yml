stages:
  - docker-build

docker-build:
  stage: docker-build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    IMAGE_NAME: rockschool-api
    IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  script:
    - docker info
    - docker build --pull -t $IMAGE_NAME:$IMAGE_TAG -f RockSchool.WebApi/Dockerfile .
  only:
    - main
    - master